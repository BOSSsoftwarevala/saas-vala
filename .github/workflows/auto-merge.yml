name: Auto Merge Main Branch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Auto-merge PR
      uses: actions/github-script@v6
      with:
        script: |
          const { data: pr } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number
          });
          
          // Auto-merge if PR is from main branch or has specific labels
          if (pr.head.ref === 'main' || 
              pr.labels.some(label => ['auto-merge', 'ready-to-merge'].includes(label.name))) {
            
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
            
            console.log(`Auto-merged PR #${context.issue.number}`);
          }

  update-main:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Git
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
    
    - name: Update version if needed
      run: |
        # Update package.json version if enterprise features were added
        if git diff --name-only HEAD~1 HEAD | grep -q "src/lib/enterprise"; then
          npm version patch --no-git-tag-version
          git add package.json
          git commit -m "chore: bump version for enterprise features"
          git push
        fi
    
    - name: Create tag for enterprise release
      run: |
        # Create tag for enterprise commits
        COMMIT_HASH=$(git rev-parse --short HEAD)
        if git log --oneline -1 | grep -q "enterprise"; then
          git tag "enterprise-v$(date +%Y%m%d-%H%M%S)-$COMMIT_HASH"
          git push --tags
        fi
