# SaaS Vala Nginx performance snippet
# Usage inside server {}:
#   include /etc/nginx/snippets/saasvala-performance.conf;

# ---------- Compression ----------
# Safe defaults (works on stock nginx packages)
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/json
  application/xml
  application/rss+xml
  application/atom+xml
  image/svg+xml
  font/ttf
  font/otf
  application/font-woff
  application/font-woff2;

# Optional: only enable if brotli module is installed
# brotli on;
# brotli_comp_level 5;
# brotli_static on;
# brotli_types
#   text/plain
#   text/css
#   text/xml
#   text/javascript
#   application/javascript
#   application/json
#   application/xml
#   image/svg+xml;

# ---------- General performance ----------
sendfile on;
tcp_nopush on;
tcp_nodelay on;
keepalive_timeout 65;
keepalive_requests 1000;
etag on;

# ---------- Cache policy ----------
# Hashed static assets from Vite dist/assets/*
location ~* ^/assets/.*\.(?:js|css|mjs|map|json|png|jpg|jpeg|gif|svg|webp|avif|ico|woff|woff2|ttf|otf)$ {
  expires 30d;
  add_header Cache-Control "public, max-age=2592000, immutable" always;
  try_files $uri =404;
}

# HTML should revalidate quickly (SPA shell)
location = /index.html {
  expires -1;
  add_header Cache-Control "no-cache, no-store, must-revalidate" always;
}

# Service worker should never be stale
location = /sw.js {
  expires -1;
  add_header Cache-Control "no-cache, no-store, must-revalidate" always;
}

location = /registerSW.js {
  expires -1;
  add_header Cache-Control "no-cache, no-store, must-revalidate" always;
}

# Web app manifest: short cache
location = /manifest.webmanifest {
  expires 1h;
  add_header Cache-Control "public, max-age=3600" always;
}

# Branded demo proxy: short cache so rewrites update quickly
location ^~ /demo-proxy/ {
  expires 5m;
  add_header Cache-Control "public, max-age=300, stale-while-revalidate=120" always;
}

# ---------- Basic security headers ----------
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ---------- SPA fallback ----------
location / {
  try_files $uri $uri/ /index.html;
}
