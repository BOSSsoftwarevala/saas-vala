server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ __WWW_DOMAIN__ demo.__DOMAIN__;

    root __SITE_DIR__;
    index index.html;

    location ^~ /demo-proxy/ {
        proxy_pass __SUPABASE_FUNCTIONS_ORIGIN__/demo-proxy/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=120" always;
    }

    # Cache static assets aggressively
    location ~* \.(?:js|mjs|css|svg|ico|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback - required for routes like /dashboard
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
