version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: saasvala-postgres
    environment:
      POSTGRES_DB: saasvala
      POSTGRES_USER: saasvala_user
      POSTGRES_PASSWORD: saasvala_secure_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - saasvala-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saasvala_user -d saasvala"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: saasvala-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saasvala-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Main Application
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: saasvala-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://saasvala_user:saasvala_secure_password_2024@postgres:5432/saasvala
      REDIS_URL: redis://redis:6379
      JWT_SECRET: saasvala_jwt_secret_ultra_secure_2024
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saasvala-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: saasvala-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/sites-available:/etc/nginx/sites-available
      - ./nginx/ssl:/etc/nginx/ssl
      - ../dist:/usr/share/nginx/html
    depends_on:
      - app
    networks:
      - saasvala-network
    restart: unless-stopped

  # Python AI Service
  ai-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ai
    container_name: saasvala-ai-service
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://saasvala_user:saasvala_secure_password_2024@postgres:5432/saasvala
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saasvala-network
    restart: unless-stopped
    volumes:
      - ./ai-models:/app/models

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: saasvala-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - saasvala-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: saasvala-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - saasvala-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  saasvala-network:
    driver: bridge
