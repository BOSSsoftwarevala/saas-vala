server {
    server_name saasvala.com www.saasvala.com demo.saasvala.com;

    root /var/www/saasvala-site/dist;
    index index.html;

    location ^~ /demo-proxy/ {
        proxy_pass https://fufriwpzypqzangcfmqu.supabase.co/functions/v1/demo-proxy/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host fufriwpzypqzangcfmqu.supabase.co;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=120" always;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /registerSW.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /manifest.webmanifest {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location ~* \.(?:js|mjs|css|svg|ico|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/saasvala.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/saasvala.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.saasvala.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = saasvala.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = demo.saasvala.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name saasvala.com www.saasvala.com demo.saasvala.com;
    return 404; # managed by Certbot
}
